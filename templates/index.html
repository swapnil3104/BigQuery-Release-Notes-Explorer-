<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Explorer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="bg-gradient-glow"></div>
    
    <div class="app-container">
        <!-- Header -->
        <header class="app-header animate-fade-in">
            <div class="header-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#logo-grad-1)"/>
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="url(#logo-grad-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="logo-grad-1" x1="2" y1="2" x2="22" y2="12" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4285F4"/>
                                <stop offset="1" stop-color="#34A853"/>
                            </linearGradient>
                            <linearGradient id="logo-grad-2" x1="2" y1="12" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#EA4335"/>
                                <stop offset="1" stop-color="#FBBC05"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>BigQuery</h1>
                    <span>Release Notes Explorer</span>
                </div>
            </div>
            
            <div class="header-actions">
                <button id="theme-toggle" class="btn btn-icon" title="Toggle Theme" aria-label="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                
                <button id="refresh-btn" class="btn btn-primary">
                    <span class="spinner-container">
                        <svg class="refresh-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </span>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Stats Dashboard -->
        <section class="stats-dashboard animate-fade-in" style="animation-delay: 0.1s">
            <div class="stat-card">
                <div class="stat-details">
                    <span class="stat-label">Total Updates</span>
                    <span id="stat-total" class="stat-value">-</span>
                </div>
                <div class="stat-icon bg-blue">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-details">
                    <span class="stat-label">Features Added</span>
                    <span id="stat-features" class="stat-value">-</span>
                </div>
                <div class="stat-icon bg-emerald">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-details">
                    <span class="stat-label">Issues & Fixes</span>
                    <span id="stat-issues" class="stat-value">-</span>
                </div>
                <div class="stat-icon bg-rose">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-details">
                    <span class="stat-label">Last Checked</span>
                    <span id="stat-synced" class="stat-value">-</span>
                </div>
                <div class="stat-icon bg-violet">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
            </div>
        </section>

        <!-- Search & Filter Controls -->
        <section class="controls-section animate-fade-in" style="animation-delay: 0.15s">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Search release notes by keywords, dates, features..." aria-label="Search release notes">
                <button id="search-clear" class="btn-clear" title="Clear Search" style="display: none;">&times;</button>
            </div>
            
            <div class="filter-actions">
                <div class="sort-box">
                    <label for="sort-select">Sort:</label>
                    <select id="sort-select" class="select-input">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Filter Chips (Dynamic) -->
        <section class="filters-section animate-fade-in" style="animation-delay: 0.2s">
            <div id="filter-chips-container" class="chips-container">
                <!-- Dynamically populated chips -->
                <button class="chip active" data-filter="all">All Updates</button>
            </div>
        </section>

        <!-- Releases Grid -->
        <main id="releases-grid" class="releases-grid animate-fade-in" style="animation-delay: 0.25s">
            <!-- Loading Skeleton Screen -->
            <div class="skeleton-card">
                <div class="skeleton-header">
                    <div class="skeleton-shimmer skeleton-title"></div>
                    <div class="skeleton-shimmer skeleton-tag"></div>
                </div>
                <div class="skeleton-shimmer skeleton-body-line"></div>
                <div class="skeleton-shimmer skeleton-body-line" style="width: 85%;"></div>
                <div class="skeleton-shimmer skeleton-body-line" style="width: 60%;"></div>
                <div class="skeleton-footer">
                    <div class="skeleton-shimmer skeleton-btn"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-header">
                    <div class="skeleton-shimmer skeleton-title"></div>
                    <div class="skeleton-shimmer skeleton-tag"></div>
                </div>
                <div class="skeleton-shimmer skeleton-body-line"></div>
                <div class="skeleton-shimmer skeleton-body-line" style="width: 90%;"></div>
                <div class="skeleton-shimmer skeleton-body-line" style="width: 40%;"></div>
                <div class="skeleton-footer">
                    <div class="skeleton-shimmer skeleton-btn"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-header">
                    <div class="skeleton-shimmer skeleton-title"></div>
                    <div class="skeleton-shimmer skeleton-tag"></div>
                </div>
                <div class="skeleton-shimmer skeleton-body-line"></div>
                <div class="skeleton-shimmer skeleton-body-line" style="width: 80%;"></div>
                <div class="skeleton-shimmer skeleton-body-line" style="width: 70%;"></div>
                <div class="skeleton-footer">
                    <div class="skeleton-shimmer skeleton-btn"></div>
                </div>
            </div>
        </main>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-state-icon">
                <svg viewBox="0 0 24 24" width="64" height="64" stroke="currentColor" stroke-width="1.5" fill="none">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    <line x1="8" y1="11" x2="14" y2="11"></line>
                </svg>
            </div>
            <h3>No release notes match your filters</h3>
            <p>Try clearing your search query or choosing a different update type chip.</p>
            <button id="clear-filters-btn" class="btn btn-secondary">Clear Filters</button>
        </div>
    </div>

    <!-- Tweet Composer Modal -->
    <div id="tweet-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Tweet Composer</h3>
                <button id="modal-close" class="btn-close" aria-label="Close modal">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="preview-card-info">
                    <span class="preview-date" id="tweet-preview-date">June 15, 2026</span>
                    <span class="tag" id="tweet-preview-tag">Feature</span>
                </div>
                
                <div class="form-group">
                    <label for="tweet-textarea">Compose your message:</label>
                    <textarea id="tweet-textarea" rows="6" maxlength="500" placeholder="What would you like to tweet?"></textarea>
                    <div class="textarea-actions">
                        <button id="tweet-shorten-btn" class="btn btn-text" title="Automatically truncate the description to fit 280 characters">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/></svg>
                            <span>Smart Truncate (280 chars)</span>
                        </button>
                        <div class="char-count-wrapper">
                            <span id="char-count">0</span>/280
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="tweet-copy-btn" class="btn btn-secondary">
                    <svg class="copy-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <svg class="check-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" style="display:none;"><polyline points="20 6 9 17 4 12"/></svg>
                    <span>Copy Text</span>
                </button>
                <button id="tweet-share-btn" class="btn btn-twitter">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    <span>Post to X</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification System -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
